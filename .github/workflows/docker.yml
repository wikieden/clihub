name: Docker

# Build + push the wikieden/clihub multi-arch image whenever a v*.*.*
# tag is pushed (or on manual dispatch). The image installs the matching
# @wikieden/clihub version from npm via the CLIHUB_VERSION build arg.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME — Docker Hub login (probably "wikieden").
#   DOCKERHUB_TOKEN    — Personal Access Token with Read & Write scope.
#
# Tags produced for v1.2.3:
#   wikieden/clihub:1.2.3
#   wikieden/clihub:1.2     (only when version is a clean semver)
#   wikieden/clihub:latest

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '@wikieden/clihub npm version to bake into the image'
        required: true
        default: 'latest'

permissions:
  contents: read

jobs:
  docker:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve clihub version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: wikieden/clihub
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            CLIHUB_VERSION=${{ steps.ver.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
